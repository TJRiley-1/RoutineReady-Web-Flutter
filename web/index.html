<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Visual classroom routine display for children">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Routine Ready">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Routine Ready</title>
  <link rel="manifest" href="manifest.json">

  <script>
    if ('serviceWorker' in navigator) {
      // When a new service worker takes control (new build deployed), reload
      // immediately so the display picks up the update without manual intervention.
      // Flutter's service worker calls skipWaiting() so activation is instant.
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });

      // Actively poll for new service worker versions every 5 minutes.
      // Without this, Chrome only checks every 24 hours on a continuously open tab,
      // meaning wall-mounted displays would run stale code for up to a day.
      navigator.serviceWorker.ready.then(registration => {
        setInterval(() => registration.update(), 5 * 60 * 1000);
      });
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
